name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    env:
      # Build never needs real secrets; validation is skipped in CI.
      SKIP_ENV_VALIDATION: "1"
      DATABASE_URL: "postgresql://user:pass@localhost:5432/labourmate"
      DIRECT_URL: "postgresql://user:pass@localhost:5432/labourmate"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npx next build
